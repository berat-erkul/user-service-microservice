spring:
  profiles:
    active: default     # adds -dev suffix → user-service-dev.yml
  cloud:
    config:
      name: user-service
      uri: http://localhost:8888
      fail-fast: true
      retry:
        max-attempts: 10
        max-interval: 2000

  datasource:
    url: ${USER_DB_URL}
    username: ${USER_DB_USERNAME}
    password: ${USER_DB_PASSWORD}

keycloak:
  credentials:
    secret: ${USER_KEYCLOAK_CREDENTIALS}

master:
  user:
    username: ${USER_KEYCLOAK_MASTER_USERNAME}
    password: ${USER_KEYCLOAK_MASTER_PASSWORD}
  realm: ${USER_KEYCLOAK_MASTER_REALM}
  client: ${USER_KEYCLOAK_MASTER_CLIENT}
